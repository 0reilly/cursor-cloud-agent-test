<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - PDF Processor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #10b981;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: opacity 0.3s;
        }
        .button:hover {
            opacity: 0.9;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h1>Payment Successful!</h1>
        <h2>Welcome to PDF Processor</h2>
        <p>Your subscription is now active. You can start using the API immediately.</p>
        <p>Your API key (Customer ID) has been sent to your email. You can also find it in your Stripe dashboard.</p>
        <p>Check out the <a href="/">documentation</a> to get started.</p>
        <a href="/" class="button">Go to Dashboard</a>
    </div>
</body>
</html>
